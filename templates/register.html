<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Anongram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <h1>Anongram</h1>
                <p>Create Your Account</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="login">Login (for authentication)</label>
                    <input type="text" id="login" name="login" required placeholder="Enter your login">
                </div>
                
                <div class="form-group">
                    <label for="nickname">Nickname (visible to others)</label>
                    <input type="text" id="nickname" name="nickname" required placeholder="Choose a unique nickname">
                </div>
                
                <button type="submit" class="submit-btn">Generate Seed Phrases</button>
            </form>
            
            <div id="seedPhraseContainer" class="seed-container" style="display: none;">
                <h3>Your Secret Seed Phrases</h3>
                <p class="warning">⚠️ IMPORTANT: Save these 13 seed phrases! You'll need them to login.</p>
                <div id="seedPhrases" class="seed-phrases"></div>
                <button onclick="copySeedPhrases()" class="copy-btn">📋 Copy Seed Phrases</button>
                <button onclick="proceedToLogin()" class="proceed-btn">Proceed to Login</button>
            </div>
            
            <div class="back-link">
                <a href="{{ url_for('index') }}">← Back to Home</a>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
